<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>佳安风管分节软件 - 更新</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; max-width: 800px; margin: 50px auto; padding: 0 20px; line-height: 1.8; }
    h1 { color: #333; border-bottom: 2px solid #1890ff; padding-bottom: 10px; }
    .version { color: #1890ff; font-size: 1.2em; margin: 20px 0; }
    .note { background: #f5f5f5; padding: 15px; border-radius: 5px; white-space: pre-line; }
    .btn { display: inline-block; padding: 12px 30px; background: #1890ff; color: #fff; text-decoration: none; border-radius: 5px; font-size: 16px; margin: 20px 0; }
    .btn:hover { background: #096dd9; }
  </style>
</head>
<body>
  <h1>佳安风管分节软件</h1>
  <p>AutoCAD 风管分节插件 - 自动更新服务</p>
  <div class="version" id="version">正在获取最新版本...</div>
  <div class="note" id="note"></div>
  <a class="btn" href="dist/风管分节软件.VLX" download>下载最新版本</a>
  <p style="color:#999;font-size:14px;margin-top:40px;">提示：在 AutoCAD 中运行命令 <b>jcgx1</b> 可自动检查更新。</p>
  <script>
    fetch('version.json').then(r=>r.json()).then(d=>{
      document.getElementById('version').textContent = '最新版本: ' + d.version;
      document.getElementById('note').textContent = '更新内容:\n' + (d.note || '');
    });
  </script>
</body>
</html>
